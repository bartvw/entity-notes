name: Release

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"

permissions:
    contents: write

jobs:
    ci:
        name: CI
        uses: ./.github/workflows/ci.yml

    release:
        needs: ci
        name: Build and release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: "pnpm"

            - name: Verify manifest version matches tag
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  MANIFEST_VERSION="$(jq -r '.version' manifest.json)"
                  if [ "$MANIFEST_VERSION" != "$TAG" ]; then
                      echo "Version mismatch: manifest.json has '$MANIFEST_VERSION', tag is '$TAG'"
                      exit 1
                  fi

            - run: pnpm install --frozen-lockfile
            - run: pnpm run build

            - name: Extract changelog for ${{ github.ref_name }}
              id: changelog
              run: |
                  body=$(awk '/^## \['"${GITHUB_REF_NAME}"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)
                  {
                      echo "body<<EOF"
                      echo "$body"
                      echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Create release and upload assets
              uses: softprops/action-gh-release@v2
              with:
                  body: ${{ steps.changelog.outputs.body }}
                  generate_release_notes: true
                  files: |
                      main.js
                      manifest.json
                      styles.css
